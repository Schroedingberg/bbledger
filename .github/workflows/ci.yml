name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Install hledger (conformance oracle)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq hledger
      - uses: DeLaGuardo/setup-clojure@3fe9b3ae632c6758d0b7757b0838606ef4287b08 # 13.4
        with:
          cli: latest
          bb: latest
          clj-kondo: latest
      - uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4.3.0
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
          key: deps-${{ hashFiles('deps.edn', 'bb.edn') }}
      - name: Lint + full suite (babashka)
        run: bb test
      - name: Full suite (JVM parity)
        run: clojure -M:test
      # nothing else ever loads ledger.main (JVM-only bot wiring): a typo'd
      # require would otherwise sail through CI into a production crash loop
      - name: Load ledger.main
        run: clojure -M -e "(require 'ledger.main)"

  # merges to main auto-release: next patch version -> versioned image ->
  # git tag + GitHub release -> sparkly announcement in the household chat
  version:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - name: Next patch version
        id: ver
        run: |
          last=$(git tag -l 'v*' --sort=-v:refname | head -1)
          if [ -z "$last" ]; then next=v0.1.0
          else IFS=. read -r major minor patch <<< "${last#v}"
               next="v$major.$minor.$((patch+1))"; fi
          echo "version=$next" >> "$GITHUB_OUTPUT"
          echo "releasing $next (previous: ${last:-none})"

  image:
    needs: version
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write # cosign keyless signing via GitHub OIDC
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      # arm64 for the Oracle A1 host, amd64 for local/x86 runs
      - uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
      - uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3.7.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # native-arch build first: smoke-test that the bot actually boots inside
      # the image (deps baked, resources/ledger.bnf present) before pushing.
      # The layer cache makes the multi-arch push build below nearly free.
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          context: .
          file: deploy/Dockerfile
          load: true
          tags: bbledger:smoke
          build-args: |
            VERSION=${{ needs.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Smoke-test the image
        run: docker run --rm bbledger:smoke clojure -M -e "(require 'ledger.main) (println :ok)"
      - uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        id: push
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            VERSION=${{ needs.version.outputs.version }}
          tags: |
            ghcr.io/schroedingberg/bbledger:latest
            ghcr.io/schroedingberg/bbledger:${{ needs.version.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      # keyless signature; the server's autodeploy runs `cosign verify
      # --certificate-identity-regexp 'https://github.com/Schroedingberg/bbledger/.*'
      # --certificate-oidc-issuer https://token.actions.githubusercontent.com`
      # before restarting onto a new image
      - uses: sigstore/cosign-installer@7e8b541eb2e61bf99390e1afd4be13a184e9ebc5 # v3.10.1
      - name: Sign the pushed image
        run: cosign sign --yes "ghcr.io/schroedingberg/bbledger@${{ steps.push.outputs.digest }}"

  release:
    needs: [version, image]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
      VERSION: ${{ needs.version.outputs.version }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - name: Tag + GitHub release
        run: gh release create "$VERSION" --target "$GITHUB_SHA" --generate-notes
      - name: Announce in the household chat
        env: # in-shell expansion keeps the token out of the workflow-rendered script
          TOKEN: ${{ secrets.BBLEDGER_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.BBLEDGER_CHAT_ID }}
        run: |
          notes=$(gh release view "$VERSION" --json body --jq .body | head -c 3500)
          curl -sS --fail-with-body \
            "https://api.telegram.org/bot${TOKEN}/sendMessage" \
            --data-urlencode "chat_id=${CHAT_ID}" \
            --data-urlencode "text=🎆✨🌟 bbledger $VERSION 🌟✨🎆

          $notes"

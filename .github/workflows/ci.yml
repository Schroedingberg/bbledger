name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install hledger (conformance oracle)
        run: sudo apt-get update -qq && sudo apt-get install -y -qq hledger
      - uses: DeLaGuardo/setup-clojure@13.4
        with:
          cli: latest
          bb: latest
          clj-kondo: latest
      - uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
          key: deps-${{ hashFiles('deps.edn', 'bb.edn') }}
      - name: Lint + full suite (babashka)
        run: bb test
      - name: Full suite (JVM parity)
        run: clojure -M:test

  image:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      # arm64 for the Oracle A1 host, amd64 for local/x86 runs
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ghcr.io/schroedingberg/bbledger:latest

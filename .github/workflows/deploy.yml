name: infra

on:
  workflow_dispatch:
    inputs:
      action:
        description: "OpenTofu action"
        type: choice
        options: [plan, apply, destroy]
        default: plan
  pull_request:
    paths: ["infra/**", "deploy/**"]

jobs:
  tofu:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: infra
    env:
      TF_VAR_tenancy_ocid: ${{ secrets.OCI_TENANCY_OCID }}
      TF_VAR_user_ocid: ${{ secrets.OCI_USER_OCID }}
      TF_VAR_fingerprint: ${{ secrets.OCI_FINGERPRINT }}
      TF_VAR_private_key: ${{ secrets.OCI_PRIVATE_KEY }}
      TF_VAR_region: ${{ secrets.OCI_REGION }}
      TF_VAR_compartment_ocid: ${{ secrets.OCI_COMPARTMENT_OCID }}
      TF_VAR_ssh_public_key: ${{ secrets.SSH_PUBLIC_KEY }}
      TF_VAR_bot_token: ${{ secrets.BBLEDGER_BOT_TOKEN }}
      TF_VAR_config_edn: ${{ secrets.BBLEDGER_CONFIG_EDN }}
      TF_VAR_ghcr_token: ${{ secrets.GHCR_PULL_TOKEN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.OCI_STATE_ACCESS_KEY }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.OCI_STATE_SECRET_KEY }}
    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v1
      - name: Init (state in OCI Object Storage, S3-compat)
        run: |
          cat > backend.hcl <<EOF
          bucket = "${{ secrets.OCI_STATE_BUCKET }}"
          region = "${{ secrets.OCI_REGION }}"
          endpoints = { s3 = "https://${{ secrets.OCI_NAMESPACE }}.compat.objectstorage.${{ secrets.OCI_REGION }}.oraclecloud.com" }
          EOF
          tofu init -backend-config=backend.hcl
      - run: tofu fmt -check && tofu validate
      - name: Plan
        if: github.event_name == 'pull_request' || inputs.action == 'plan'
        run: tofu plan -no-color
      - name: Apply
        if: inputs.action == 'apply'
        run: tofu apply -auto-approve -no-color
      - name: Destroy
        if: inputs.action == 'destroy'
        run: tofu destroy -auto-approve -no-color

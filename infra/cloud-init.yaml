#cloud-config
# Provisions the bbledger bot host. State (household.ledger + config.edn)
# comes from the private data repo — this file only handles credentials and
# services. The systemd units are the SAME files as deploy/bbledger-*,
# injected verbatim by templatefile().
package_update: true
packages:
  - docker.io
  - git

write_files:
  - path: /etc/bbledger.env
    permissions: "0600"
    content: |
      BBLEDGER_BOT_TOKEN=${bot_token}
  - path: /root/.ssh/id_ed25519
    permissions: "0600"
    content: |
      ${indent(6, data_deploy_key)}
  - path: /etc/systemd/system/bbledger-bot.service
    content: |
      ${indent(6, bot_unit)}
  - path: /etc/systemd/system/bbledger-summary.service
    content: |
      ${indent(6, summary_unit)}
  - path: /etc/systemd/system/bbledger-summary.timer
    content: |
      ${indent(6, summary_timer)}
  - path: /etc/systemd/system/bbledger-push.service
    content: |
      ${indent(6, push_unit)}
  - path: /etc/systemd/system/bbledger-push.path
    content: |
      ${indent(6, push_path)}

runcmd:
  - systemctl enable --now docker
  - ssh-keyscan github.com >> /root/.ssh/known_hosts
  - |
    if [ ! -d /srv/bbledger/data/.git ]; then
      git clone '${data_repo}' /srv/bbledger/data
      git -C /srv/bbledger/data config user.name bbledger-bot
      git -C /srv/bbledger/data config user.email bot@localhost
    fi
  # only needed while the GHCR package is private
  - |
    if [ -n '${ghcr_token}' ]; then
      echo '${ghcr_token}' | docker login ghcr.io -u '${ghcr_user}' --password-stdin
    fi
  - systemctl daemon-reload
  - systemctl enable --now bbledger-bot.service bbledger-summary.timer bbledger-push.path
